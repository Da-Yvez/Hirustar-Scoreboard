<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Hirustar — Live Scoreboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="display-container">
    <video class="bg-video" autoplay loop muted playsinline>
      <source src="/Grig Sparks BG.mp4" type="video/mp4">
    </video>
    <div class="scoreboard-panel" id="scoreboardPanel">
      <div class="scoreboard-header">
        <h1 class="scoreboard-title">HIRUSTAR SEASON 5</h1>
        <div class="scoreboard-subtitle">Live Scoreboard</div>
      </div>
      <div class="contestant-list" id="contestantList"></div>
    </div>

    <!-- ── FINAL RESULTS OVERLAY ────────────────────────── -->
    <div class="results-overlay" id="resultsOverlay">
      <div class="results-header">
        <h1 class="scoreboard-title">THE FINAL VERDICT</h1>
        <div class="scoreboard-subtitle">JUDGE SELECTIONS</div>
      </div>
      <div class="results-grid" id="resultsGrid"></div>
    </div>
  </div>
  <script src="/socket.io.min.js"></script>
  <script src="/display.js"></script>
</body>
</html>
