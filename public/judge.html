<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hirustar — Judge Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e2e;
      color: #fff;
      border: 1px solid #ff4d6d;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      pointer-events: none;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-taken { border-color: #f59e0b; }
    #toast.toast-voted { border-color: #6366f1; }

    /* ── VOTED button — bright yellow, animated ──────────────────── */
    .btn-voted {
      background: #f59e0b !important;
      border: 2px solid #fbbf24 !important;
      color: #1a1a1a !important;
      font-weight: 900 !important;
      letter-spacing: 0.08em !important;
      cursor: default !important;
      pointer-events: none;
      opacity: 1 !important;
      animation: votedPulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(251,191,36,0.7);
    }
    @keyframes votedPulse {
      0%   { box-shadow: 0 0 0 0   rgba(251,191,36,0.7); }
      50%  { box-shadow: 0 0 0 10px rgba(251,191,36,0);  }
      100% { box-shadow: 0 0 0 0   rgba(251,191,36,0);   }
    }

    /* ── Greyed-out button (other rows after voting) ─────────────── */
    .btn-greyed {
      opacity: 0.3 !important;
      cursor: default !important;
      pointer-events: none;
      filter: grayscale(1);
    }

    /* ── Fixed size for ALL vote buttons — same placeholder on every screen ── */
    .judge-actions .btn-plus7 {
      width: 140px !important;
      min-width: 140px !important;
      max-width: 140px !important;
      height: 52px !important;
      min-height: 52px !important;
      box-sizing: border-box !important;
      overflow: hidden;
    }

    /* ── Taken-by-other button (other judges' view) ──────────────── */
    .btn-taken-by {
      opacity: 1 !important;
      cursor: default !important;
      pointer-events: none;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      padding: 4px 8px 4px 6px !important;
      background: rgba(251,191,36,0.08) !important;
      border: 2px solid #f59e0b !important;
      color: #fde68a !important;
    }
    .btn-taken-by .tb-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid #fbbf24;
      box-shadow: 0 0 10px rgba(251,191,36,0.55), 0 0 22px rgba(251,191,36,0.25);
    }
    .btn-taken-by .tb-label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.3;
      min-width: 0; /* allow text truncation */
      overflow: hidden;
    }
    .btn-taken-by .tb-sub  {
      font-size: 0.45rem;
      opacity: 0.65;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }
    .btn-taken-by .tb-name {
      font-size: 0.78rem;
      font-weight: 800;
      color: #fbbf24;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Slide to vote control ───────────────────────────────────── */
    .judge-actions .vote-slider {
      width: 140px;
      min-width: 140px;
      max-width: 140px;
      height: 52px;
      border-radius: 999px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 4px;
      border: 2px solid rgba(251, 191, 36, 0.65);
      background: linear-gradient(135deg, rgba(58, 39, 5, 0.95), rgba(92, 58, 8, 0.95));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 0 18px rgba(245, 158, 11, 0.2);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      overflow: hidden;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .judge-actions .vote-slider[data-disabled="true"] {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(71, 85, 105, 0.22);
      filter: grayscale(0.3);
      opacity: 0.7;
    }

    .vote-slider-track-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fef3c7;
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0.9;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
      transition: color 0.2s ease, letter-spacing 0.2s ease, text-shadow 0.2s ease;
    }

    .vote-slider-progress {
      position: absolute;
      left: 4px;
      top: 4px;
      bottom: 4px;
      width: 0;
      border-radius: 999px;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.28), rgba(251, 191, 36, 0.58));
      transition: width 0.05s linear;
      z-index: 1;
    }

    .vote-slider-handle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
      color: #3b2200;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: grab;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(245, 158, 11, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.42);
      transform: translateX(0);
      transition: transform 0.18s ease, box-shadow 0.2s ease, filter 0.2s ease;
      position: relative;
      z-index: 3;
    }

    .vote-slider-handle:active {
      cursor: grabbing;
    }

    .vote-slider[data-disabled="true"] .vote-slider-handle {
      cursor: default;
      background: linear-gradient(180deg, #94a3b8, #64748b);
      color: #e2e8f0;
      box-shadow: none;
    }

    .vote-slider[data-complete="true"] .vote-slider-track-text {
      color: #fef3c7;
      letter-spacing: 0.14em;
    }

    .vote-slider.vote-slider-near-end {
      border-color: #fbbf24;
      background: linear-gradient(135deg, rgba(95, 54, 8, 0.96), rgba(135, 79, 12, 0.95));
      box-shadow: 0 0 22px rgba(251, 191, 36, 0.55), 0 0 36px rgba(245, 158, 11, 0.35);
      transform: translateY(-1px);
    }

    .vote-slider.vote-slider-near-end .vote-slider-track-text {
      color: #fff8d6;
      text-shadow: 0 0 12px rgba(251, 191, 36, 0.65);
      letter-spacing: 0.13em;
    }

    .vote-slider.vote-slider-near-end .vote-slider-handle {
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.26), 0 10px 24px rgba(245, 158, 11, 0.55);
      filter: saturate(1.15);
      animation: nearEndPop 0.45s ease-out;
    }

    @keyframes nearEndPop {
      0% { transform: translateX(var(--slide-x, 0px)) scale(1); }
      50% { transform: translateX(var(--slide-x, 0px)) scale(1.08); }
      100% { transform: translateX(var(--slide-x, 0px)) scale(1.03); }
    }
  </style>
</head>
<body class="judge-view-container">
  <div class="panel-page">
    <div class="panel-header" id="panelHeader">
      <img class="panel-judge-avatar" id="judgeAvatar" src="" alt="">
      <div>
        <div class="panel-title" id="judgeName">Judge Panel</div>
        <div class="panel-label">Hirustar Season 5</div>
      </div>
    </div>

    <div class="contestant-list" id="contestantList"></div>
  </div>

  <div id="toast"></div>

  <script src="/socket.io.min.js"></script>
  <script>
    const socket = io();
    const judgeId = parseInt(window.location.pathname.split('/').pop());
    const list = document.getElementById('contestantList');

    socket.on('connect', () => socket.emit('identify', { type: 'judge', id: judgeId }));

    /* ── Toast ──────────────────────────────────────────────────── */
    let toastTimer;
    function showToast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (type ? ` toast-${type}` : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 3500);
    }

    /* ── Fallback SVG avatar ────────────────────────────────────── */
    function fallbackSvg(letter, bg) {
      return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22${bg}%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2262%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2238%22 font-family=%22sans-serif%22>${letter}</text></svg>`;
    }

    /* ── Build one row ──────────────────────────────────────────── */
    function buildRow(c, index, judges, judgeVotes, myVotedId, topN) {
      const rank = index + 1;

      // Who voted for this contestant?
      const claimedEntry    = Object.entries(judgeVotes).find(([, cid]) => cid === c.id);
      const claimedByJudgeId = claimedEntry?.[0];
      const claimedByJudge  = claimedByJudgeId
        ? judges.find(j => String(j.id) === String(claimedByJudgeId))
        : null;

      const isMyVote       = myVotedId === c.id;            // I voted for this one
      const isTakenByOther = claimedByJudge && !isMyVote;   // Someone else voted for this
      const iHaveVoted     = myVotedId !== null;             // I have voted (somewhere)

      /* ── Button logic ─────────────────────────────────────────── */
      let btnHTML;

      if (isMyVote) {
        // ★ Bright yellow VOTED button — MY choice
        btnHTML = `<button class="btn-plus7 btn-voted" disabled>★ VOTED</button>`;

      } else if (isTakenByOther) {
        // Another judge voted here — highlighted indicator with their avatar
        const jImg      = `/images/judges/${claimedByJudge.image}`;
        const jFallback = fallbackSvg(claimedByJudge.name.charAt(0), '#7a5c00');
        const firstName = claimedByJudge.name.split(' ')[0];
        btnHTML = `
          <button class="btn-plus7 btn-taken-by" disabled>
            <img class="tb-avatar" src="${jImg}"
                 onerror="this.src='${jFallback}'"
                 title="${claimedByJudge.name}">
            <div class="tb-label">
              <span class="tb-sub">Voted by</span>
              <span class="tb-name">${firstName}</span>
            </div>
          </button>`;

      } else if (iHaveVoted) {
        // I already voted elsewhere — show disabled slider style
        btnHTML = `
          <div class="vote-slider btn-greyed" data-disabled="true">
            <div class="vote-slider-track-text">VOTE LOCKED</div>
            <div class="vote-slider-progress"></div>
            <button class="vote-slider-handle" type="button" disabled>➜</button>
          </div>`;

      } else {
        // Open — can vote by sliding arrow fully right
        btnHTML = `
          <div class="vote-slider" data-contestant-id="${c.id}" data-disabled="false" data-complete="false">
            <div class="vote-slider-track-text">SLIDE TO VOTE</div>
            <div class="vote-slider-progress"></div>
            <button class="vote-slider-handle" type="button" onpointerdown="startVoteSlide(event, ${c.id})">➜</button>
          </div>`;
      }

      const row = document.createElement('div');
      row.className = `display-row ${rank <= topN ? 'top' : 'low'}`;
      row.dataset.id = c.id;
      row.innerHTML = `
        <div class="display-bar">
          <div class="display-bar-fill" style="width:${c.score}%"></div>
          <div class="display-content">
            <div class="display-rank">${String(rank).padStart(2, '0')}</div>
            <div class="display-name">${c.name}</div>
            <div class="display-percent">${c.score}%</div>
            <div class="judge-actions">${btnHTML}</div>
            <img class="display-avatar" src="/images/contestants/${c.image}" alt="${c.name}"
                 onerror="this.src='${fallbackSvg(c.name.charAt(0), '#333')}'">
          </div>
        </div>`;
      return row;
    }

    /* ── Render ─────────────────────────────────────────────────── */
    function render(data) {
      const { contestants, judges, judgeVotes, topN = 4 } = data;
      const judge = judges.find(j => j.id === judgeId);

      if (judge) {
        document.getElementById('judgeName').textContent = judge.name;
        const av = document.getElementById('judgeAvatar');
        av.src = `/images/judges/${judge.image}`;
        av.onerror = () => { av.src = fallbackSvg(judge.name.charAt(0), '#444'); };
      }

      const myVotedId = judgeVotes[judgeId] ?? null;

      // FLIP — store old positions
      const oldRects = {};
      document.querySelectorAll('.display-row').forEach(r => {
        oldRects[r.dataset.id] = r.getBoundingClientRect();
      });

      // Rebuild
      list.innerHTML = '';
      contestants.forEach((c, i) => list.appendChild(buildRow(c, i, judges, judgeVotes, myVotedId, topN)));

      // FLIP — animate
      document.querySelectorAll('.display-row').forEach(r => {
        const old = oldRects[r.dataset.id];
        if (!old) return;
        const dy = old.top - r.getBoundingClientRect().top;
        if (Math.abs(dy) > 1) {
          r.style.transform = `translateY(${dy}px)`;
          r.style.transition = 'none';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            r.classList.add('flip-animate');
            r.style.transform = '';
            r.style.transition = '';
            r.addEventListener('transitionend', () => r.classList.remove('flip-animate'), { once: true });
          }));
        }
      });
    }

    /* ── Actions ────────────────────────────────────────────────── */
    function addScore(contestantId) {
      socket.emit('add_score', { contestantId, judgeId });
    }

    const slideState = {
      activeSlider: null,
      activeHandle: null,
      contestantId: null,
      startClientX: 0,
      startOffset: 0,
      maxOffset: 0,
      moved: false
    };

    function resetVoteSlide(slider, animate = true) {
      if (!slider) return;
      const handle = slider.querySelector('.vote-slider-handle');
      const progress = slider.querySelector('.vote-slider-progress');
      if (!handle) return;
      handle.style.transition = animate ? 'transform 0.18s ease' : 'none';
      handle.style.transform = 'translateX(0px)';
      handle.style.setProperty('--slide-x', '0px');
      if (progress) progress.style.width = '0px';
      slider.classList.remove('vote-slider-near-end');
      slider.dataset.complete = 'false';
    }

    function startVoteSlide(event, contestantId) {
      const handle = event.currentTarget;
      const slider = handle.closest('.vote-slider');
      if (!slider || slider.dataset.disabled === 'true') return;

      const trackWidth = slider.clientWidth;
      const handleWidth = handle.clientWidth;
      const currentTransform = handle.style.transform || 'translateX(0px)';
      const currentOffset = Number((currentTransform.match(/-?\d+(\.\d+)?/) || [0])[0]);

      slideState.activeSlider = slider;
      slideState.activeHandle = handle;
      slideState.contestantId = contestantId;
      slideState.startClientX = event.clientX;
      slideState.startOffset = currentOffset;
      slideState.maxOffset = Math.max(0, trackWidth - handleWidth - 8);
      slideState.moved = false;

      handle.style.transition = 'none';
      handle.setPointerCapture(event.pointerId);
      event.preventDefault();
    }

    function moveVoteSlide(event) {
      if (!slideState.activeSlider || !slideState.activeHandle) return;

      const dx = event.clientX - slideState.startClientX;
      const nextOffset = Math.min(
        slideState.maxOffset,
        Math.max(0, slideState.startOffset + dx)
      );

      const progressEl = slideState.activeSlider.querySelector('.vote-slider-progress');
      const moveProgress = slideState.maxOffset > 0 ? (nextOffset / slideState.maxOffset) : 0;
      const nearEnd = moveProgress >= 0.78;

      slideState.activeHandle.style.transform = `translateX(${nextOffset}px)`;
      slideState.activeHandle.style.setProperty('--slide-x', `${nextOffset}px`);
      if (progressEl) {
        const filledWidth = Math.min(slideState.activeSlider.clientWidth - 8, nextOffset + slideState.activeHandle.clientWidth);
        progressEl.style.width = `${filledWidth}px`;
      }
      slideState.activeSlider.classList.toggle('vote-slider-near-end', nearEnd);
      slideState.moved = true;
    }

    function endVoteSlide(event) {
      if (!slideState.activeSlider || !slideState.activeHandle) return;

      const slider = slideState.activeSlider;
      const handle = slideState.activeHandle;
      const moveProgress = slideState.maxOffset > 0
        ? Number((handle.style.transform.match(/-?\d+(\.\d+)?/) || [0])[0]) / slideState.maxOffset
        : 0;

      const shouldVote = slideState.moved && moveProgress > 0.92;

      if (shouldVote) {
        handle.style.transition = 'transform 0.12s ease-out';
        handle.style.transform = `translateX(${slideState.maxOffset}px)`;
        handle.style.setProperty('--slide-x', `${slideState.maxOffset}px`);
        const progressEl = slider.querySelector('.vote-slider-progress');
        if (progressEl) progressEl.style.width = `${slider.clientWidth - 8}px`;
        slider.dataset.complete = 'true';
        slider.dataset.disabled = 'true';
        slider.classList.add('vote-slider-near-end');
        addScore(slideState.contestantId);
      } else {
        resetVoteSlide(slider, true);
      }

      if (typeof event.pointerId === 'number') {
        try { handle.releasePointerCapture(event.pointerId); } catch (e) {}
      }

      slideState.activeSlider = null;
      slideState.activeHandle = null;
      slideState.contestantId = null;
      slideState.startClientX = 0;
      slideState.startOffset = 0;
      slideState.maxOffset = 0;
      slideState.moved = false;
    }

    window.addEventListener('pointermove', moveVoteSlide);
    window.addEventListener('pointerup', endVoteSlide);
    window.addEventListener('pointercancel', endVoteSlide);

    socket.on('vote_rejected', ({ reason }) => {
      if (reason === 'already_voted')
        showToast('⚠️ You have already cast your vote!', 'voted');
      else if (reason === 'contestant_taken')
        showToast('🔒 That contestant was already claimed by another judge!', 'taken');
    });

    socket.on('state_update', render);
  </script>
</body>
</html>
