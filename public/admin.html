<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hirustar — Admin Dashboard</title>
  <link rel="stylesheet" href="/admin.css">
  <style>
    .nodes-panel {
      margin-top: auto;
      padding: 1rem 0.75rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .nodes-title {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .nodes-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .node-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.6rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      font-size: 0.72rem;
      font-weight: 600;
      color: #94a3b8;
      transition: background 0.2s, color 0.2s;
    }
    .node-pill.online {
      background: rgba(34,197,94,0.15);
      color: #166534;
    }
    .node-pill.offline {
      background: rgba(239,68,68,0.1);
      color: #991b1b;
    }
    .node-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .node-pill.online .node-dot {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.7);
    }
    .node-pill.offline .node-dot {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239,68,68,0.5);
    }
    
    .node-group {
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .node-group-title {
      font-size: 0.65rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 0.2rem;
      padding-left: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .node-group-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    /* Make sidebar flex so nodes panel sticks to bottom */
    .admin-sidebar { display: flex; flex-direction: column; }
    .admin-tabs { flex: 1; overflow-y: auto; }

    /* Judge URL badge in content manager */
    .judge-url-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      padding: 3px 8px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 6px;
      font-size: 0.68rem;
      font-weight: 700;
      color: #a5b4fc;
      letter-spacing: 0.03em;
      font-family: monospace;
      user-select: all;
    }
    .judge-url-badge .badge-icon { font-size: 0.6rem; opacity: 0.7; font-family: sans-serif; }

    /* Top N Controller */
    .topn-control {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: linear-gradient(145deg, rgba(30,41,59,0.7), rgba(15,23,42,0.9));
      padding: 0.4rem 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .topn-control label {
      font-size: 0.72rem;
      color: #94a3b8;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .topn-input-wrapper {
      display: flex;
      align-items: center;
      background: #0f172a;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .topn-input-wrapper button {
      background: rgba(255,255,255,0.03);
      border: none;
      color: #cbd5e1;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .topn-input-wrapper button:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .topn-input-wrapper input {
      background: transparent;
      border: none;
      color: #22c55e;
      width: 32px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 800;
      font-family: monospace;
      outline: none;
      pointer-events: none;
    }
  </style>
</head>
<body class="admin-body">
  <div class="admin-shell">
    <!-- ── SIDEBAR NAVIGATION ──────────────────────────────── -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">H</div>
        <div class="logo-text">Hirustar Season 5</div>
      </div>

      <nav class="admin-tabs">
        <button class="admin-tab active" id="tabScores" onclick="switchTab('scores')">
          <span class="tab-icon">🏆</span>
          <span class="tab-label">Live Scores</span>
        </button>
        <button class="admin-tab" id="tabContent" onclick="switchTab('content')">
          <span class="tab-icon">🧩</span>
          <span class="tab-label">Content Manager</span>
        </button>
      </nav>

      <!-- ── REMOTE CONTROL ────────────────────────────────── -->
      <div class="nodes-panel" style="padding-bottom: 0;">
        <div class="nodes-title" style="color: #cbd5e1;">Remote View Control</div>
        <div style="display:flex; flex-direction:column; gap:0.5rem;">
          <button class="btn-admin primary" onclick="broadcastFocus('browser')" style="width:100%; justify-content:center; padding:0.6rem; font-size:0.8rem; border-radius:8px;">🌐 Show Judges</button>
          <button class="btn-admin" onclick="broadcastFocus('exe')" style="width:100%; justify-content:center; padding:0.6rem; font-size:0.8rem; background:rgba(255,255,255,0.1); border-radius:8px;">⚙️ Show App</button>
        </div>
      </div>

      <!-- ── CONNECTED NODES ──────────────────────────────── -->
      <div class="nodes-panel" style="margin-top: 0; border-top: none;">
        <div class="nodes-title">Connected Nodes</div>
        <div id="nodesList" class="nodes-list">
          <!-- Dynamically populated -->
        </div>
      </div>
    </aside>

    <!-- ── MAIN CONTENT AREA ────────────────────────────────── -->
    <main class="admin-main">
      <header class="page-header">
        <div class="header-title">
          <h1 id="pageTitle">Live Scores</h1>
          <p id="pageSubtitle">Monitor and manage real-time contestant rankings.</p>
        </div>
      </header>

      <!-- ── SCORES TAB ─────────────────────────────────── -->
      <div class="tab-page visible" id="pageScores">
        <div class="admin-action-bar">
          <div class="action-group">
            <div class="topn-control">
              <label>Top Ranked (Green):</label>
              <div class="topn-input-wrapper">
                <button onclick="changeTopN(-1)">-</button>
                <input id="topNInput" type="number" min="1" max="20" value="4" readonly>
                <button onclick="changeTopN(1)">+</button>
              </div>
            </div>
            <button class="btn-admin primary" onclick="resetVotes()">
              <span>🔄</span> Reset Round Votes
            </button>
            <button class="btn-admin primary" id="btnShowResults" onclick="showResults()" style="display: none; background: linear-gradient(135deg, #d4a017, #f5c842); color: white; border: none;">
              <span>🌟</span> Show Final Results
            </button>
            <button class="btn-admin" id="btnHideResults" onclick="hideResults()" style="display: none;">
              <span>👁️‍🗨️</span> Hide Results
            </button>
          </div>
          <div class="action-group">
            <button class="btn-admin danger" onclick="resetScores()">
              <span>🗑️</span> Reset All Scores
            </button>
          </div>
        </div>
        <div class="scores-grid" id="contestantList">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- ── CONTENT TAB ────────────────────────────────── -->
      <div class="tab-page" id="pageContent">
        <div class="admin-action-bar">
          <div class="action-group">
            <button class="btn-admin primary" onclick="addContestant()">
              <span>👤</span> Add Contestant
            </button>
            <button class="btn-admin" onclick="addJudge()">
              <span>👨‍⚖️</span> Add Judge
            </button>
          </div>
          <div class="action-group">
            <button class="btn-admin danger" onclick="removeAllContestants()">
              Remove All
            </button>
          </div>
        </div>

        <section class="content-section">
          <div class="section-header">
            <h2>Contestants</h2>
            <p>Manage contestant profiles, photos, and base scores.</p>
          </div>
          <div class="content-list" id="contentContestants">
            <!-- Dynamically populated -->
          </div>
        </section>

        <section class="content-section">
          <div class="section-header">
            <h2>Judges</h2>
            <p>Configure judge identities and panel appearances.</p>
          </div>
          <div class="content-list" id="contentJudges">
            <!-- Dynamically populated -->
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Hidden file input reused for all uploads -->
  <input type="file" id="fileInputHidden" class="file-input-hidden" accept="image/*">

  <script src="/socket.io.min.js"></script>
  <script>
    let activeTab = 'scores';
    let allJudges = [];
    let allContestants = [];
    const socket = io();
    socket.on('connect', () => socket.emit('identify', { type: 'admin' }));

    // ── Tab switching ──────────────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('visible'));
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      
      const targetPage = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
      const targetTab = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
      
      targetPage.classList.add('visible');
      targetTab.classList.add('active');

      // Update Header
      const title = document.getElementById('pageTitle');
      const subtitle = document.getElementById('pageSubtitle');
      if (tab === 'scores') {
        title.innerText = 'Live Scores';
        subtitle.innerText = 'Monitor and manage real-time contestant rankings.';
      } else {
        title.innerText = 'Content Manager';
        subtitle.innerText = 'Customize contestants and judges for the competition.';
        buildContentManager();
      }
    }

    // ── Rendering & Socket logic ──────────────────────────────────────────
    function fallback(ch, bg) {
      return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22${bg}%22 width=%22100%25%22 height=%22100%25%22/><text x=%2250%22 y=%2262%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2238%22 font-family=%22sans-serif%22>${ch}</text></svg>`;
    }

    function render(data) {
      const { contestants, judges, judgeVotes, allVoted, showResultsMode, topN } = data;
      allJudges = judges;
      allContestants = contestants;
      
      const topNInput = document.getElementById('topNInput');
      if (topNInput && topN !== undefined) {
        topNInput.value = topN;
      }
      
      // Update Results Button Visibility
      const btnShow = document.getElementById('btnShowResults');
      const btnHide = document.getElementById('btnHideResults');
      if (btnShow && btnHide) {
        btnShow.style.display = (allVoted && !showResultsMode) ? 'inline-flex' : 'none';
        btnHide.style.display = showResultsMode ? 'inline-flex' : 'none';
      }

      const list = document.getElementById('contestantList');
      list.innerHTML = '';

      contestants.forEach(c => {
        const card = document.createElement('div');
        card.className = 'score-row-card';
        card.innerHTML = `
          <img class="contestant-avatar" src="/images/contestants/${c.image}" alt="${c.name}"
               onerror="this.src='${fallback(c.name.charAt(0),'%2364748b')}'">
          <div class="contestant-name">${c.name}</div>
          <div class="vote-indicators">${judges.map(j => {
            const jv = judgeVotes[j.id] === c.id;
            return `<img class="vote-indicator ${jv?'voted':''}" src="/images/judges/${j.image}"
              onerror="this.src='${fallback(j.name.charAt(0),'%2394a3b8')}'" title="${j.name}">`;
          }).join('')}</div>
          <input class="content-input score-edit-input" type="number" value="${c.score}"
                 onchange="setScore(${c.id}, this.value)" title="Edit score">
          <div class="admin-judge-btns">${judges.map(j => {
            const disabled = judgeVotes[j.id] === c.id;
            return `<button class="btn-plus7" ${disabled?'disabled':''}
              onclick="addAsJudge(${c.id},${j.id})">+7<span class="judge-label">${j.name.split(' ')[0]}</span></button>`;
          }).join('')}</div>`;
        list.appendChild(card);
      });

      if (activeTab === 'content') buildContentManager();
    }

    function addAsJudge(contestantId, judgeId) { socket.emit('add_score', { contestantId, judgeId, force: true }); }
    function setScore(contestantId, score) { socket.emit('set_score', { contestantId, score: parseInt(score) }); }
    function updateTopN(value) { socket.emit('set_top_n', { value: parseInt(value) }); }
    function changeTopN(delta) {
      const input = document.getElementById('topNInput');
      let val = parseInt(input.value) + delta;
      val = Math.max(1, Math.min(20, val));
      updateTopN(val);
    }
    function resetVotes() { if (confirm('Reset all judge votes for a new round?')) socket.emit('reset_votes'); }
    function resetScores() { if (confirm('Reset ALL scores to 0? This cannot be undone.')) socket.emit('reset_scores'); }
    function broadcastFocus(target) { socket.emit('broadcast_focus', { target }); }
    function showResults() { socket.emit('show_results'); }
    function hideResults() { socket.emit('hide_results'); }

    socket.on('state_update', render);

    // ── Node connection indicator ──────────────────────────────────────────
    socket.on('nodes_update', (nodes) => {
      const list = document.getElementById('nodesList');
      if (!list) return;

      // Track online status
      const online = {
        display: false,
        judges: {}, // { id: { window: bool, agent: bool } }
        genericAgents: 0
      };

      nodes.forEach(n => {
        if (n.type === 'display') online.display = true;
        if (n.type === 'judge' && n.id != null) {
          if (!online.judges[n.id]) online.judges[n.id] = {};
          online.judges[n.id].window = true;
        }
        if (n.type === 'agent') {
          if (n.id != null) {
            if (!online.judges[n.id]) online.judges[n.id] = {};
            online.judges[n.id].agent = true;
          } else {
            online.genericAgents++;
          }
        }
      });

      list.innerHTML = '';

      // 1. Display
      const dPill = document.createElement('div');
      dPill.className = 'node-pill ' + (online.display ? 'online' : 'offline');
      dPill.innerHTML = `<span class="node-dot"></span>📺 Main Display`;
      list.appendChild(dPill);

      // 2. Judges Grouped
      allJudges.forEach(j => {
        const group = document.createElement('div');
        group.className = 'node-group';
        group.innerHTML = `<div class="node-group-title">${j.name}</div>`;
        
        const winOnline = online.judges[j.id]?.window;
        const wPill = document.createElement('div');
        wPill.className = 'node-pill ' + (winOnline ? 'online' : 'offline');
        wPill.innerHTML = `<span class="node-dot"></span>🌐 Window Connection`;
        
        const ageOnline = online.judges[j.id]?.agent;
        const aPill = document.createElement('div');
        aPill.className = 'node-pill ' + (ageOnline ? 'online' : 'offline');
        aPill.innerHTML = `<span class="node-dot"></span>🔌 Switcher Agent`;
        
        group.appendChild(wPill);
        group.appendChild(aPill);
        list.appendChild(group);
      });

      // 3. Generic Agents
      if (online.genericAgents > 0) {
        const group = document.createElement('div');
        group.className = 'node-group';
        group.innerHTML = `<div class="node-group-title">Other Agents</div>`;
        for (let i = 0; i < online.genericAgents; i++) {
          const pill = document.createElement('div');
          pill.className = 'node-pill online';
          pill.innerHTML = `<span class="node-dot"></span>🔌 Agent (Unassigned)`;
          group.appendChild(pill);
        }
        list.appendChild(group);
      }
    });

    // ── Content Manager ────────────────────────────────────────────────────
    function avatarSrcFor(type, filename, name) {
      const folder = type === 'judge' ? 'judges' : 'contestants';
      const safe = (filename || '').trim();
      if (safe) return `/images/${folder}/${safe}`;
      return fallback((name || '?').charAt(0), '#64748b');
    }

    function clampScore(n) {
      const v = Number(n);
      if (!Number.isFinite(v)) return 0;
      return Math.max(0, Math.min(100, Math.round(v)));
    }

    function buildContentManager() {
      const cWrap = document.getElementById('contentContestants');
      const jWrap = document.getElementById('contentJudges');
      cWrap.innerHTML = '';
      jWrap.innerHTML = '';

      allContestants
        .slice()
        .sort((a, b) => a.id - b.id)
        .forEach(c => {
          const card = document.createElement('div');
          card.className = 'content-card';
          card.innerHTML = `
            <div class="card-top">
              <div class="card-avatar-wrap">
                <img class="content-avatar" id="c-avatar-${c.id}" src="${avatarSrcFor('contestant', c.image, c.name)}" 
                     onerror="this.src='${fallback((c.name||'?').charAt(0), '#64748b')}'">
              </div>
              <div class="card-info">
                <input class="content-input" id="c-name-${c.id}" value="${(c.name || '').replaceAll('"','&quot;')}" placeholder="Name">
                <div class="score-wrap">
                  <span class="score-label">Base Score:</span>
                  <input class="content-input content-score" id="c-score-${c.id}" type="number" min="0" max="100" value="${clampScore(c.score)}">
                </div>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-small" onclick="uploadForContestant(${c.id})">Photo</button>
              <button class="btn-small primary" onclick="saveContestant(${c.id})">Save</button>
              <button class="btn-small danger" onclick="deleteContestant(${c.id})">Delete</button>
            </div>
          `;
          cWrap.appendChild(card);
        });

      allJudges
        .slice()
        .sort((a, b) => a.id - b.id)
        .forEach(j => {
          const card = document.createElement('div');
          card.className = 'content-card';
          card.innerHTML = `
            <div class="card-top">
              <div class="card-avatar-wrap">
                <img class="content-avatar" id="j-avatar-${j.id}" src="${avatarSrcFor('judge', j.image, j.name)}" 
                     onerror="this.src='${fallback((j.name||'?').charAt(0), '#94a3b8')}'">
              </div>
              <div class="card-info">
                <input class="content-input" id="j-name-${j.id}" value="${(j.name || '').replaceAll('"','&quot;')}" placeholder="Judge Name">
                <div class="judge-url-badge" title="Judge panel URL">
                  <span class="badge-icon">🔗</span>/judge/${j.id}
                </div>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-small" onclick="uploadForJudge(${j.id})">Photo</button>
              <button class="btn-small primary" onclick="saveJudge(${j.id})">Save</button>
              <button class="btn-small danger" onclick="deleteJudge(${j.id})">Delete</button>
            </div>
          `;
          jWrap.appendChild(card);
        });
    }

    // CRUD functions remain mostly same but integrated with new UI
    function addContestant() {
      const name = prompt('New contestant name?');
      if (!name) return;
      socket.emit('upsert_contestant', { name: name.trim(), score: 0 });
      if (activeTab !== 'content') switchTab('content');
    }

    function addJudge() {
      const name = prompt('New judge name?');
      if (!name) return;
      socket.emit('upsert_judge', { name: name.trim() });
      if (activeTab !== 'content') switchTab('content');
    }

    function saveContestant(id) {
      const name = document.getElementById(`c-name-${id}`).value.trim();
      const score = clampScore(document.getElementById(`c-score-${id}`).value);
      const c = allContestants.find(x => x.id === id);
      socket.emit('upsert_contestant', { id, name, score, image: c?.image });
    }

    function deleteContestant(id) {
      if (!confirm('Delete this contestant?')) return;
      socket.emit('delete_contestant', { id });
    }

    function saveJudge(id) {
      const name = document.getElementById(`j-name-${id}`).value.trim();
      const j = allJudges.find(x => x.id === id);
      socket.emit('upsert_judge', { id, name, image: j?.image });
    }

    function deleteJudge(id) {
      if (!confirm('Delete this judge?')) return;
      socket.emit('delete_judge', { id });
    }

    function removeAllContestants() {
      if (!confirm('Remove ALL contestants?')) return;
      socket.emit('clear_contestants');
    }

    // ── Upload ─────────────────────────────────────────────────────────────
    let pendingUpload = null;
    function triggerUploadDirect(filename, type, afterUpload) {
      pendingUpload = { filename, type, afterUpload };
      const fi = document.getElementById('fileInputHidden');
      fi.value = '';
      fi.click();
    }

    function uploadForContestant(id) {
      const c = allContestants.find(x => x.id === id);
      const base = `contestant_${id}_${Date.now()}`;
      triggerUploadDirect(base, 'contestant', (data) => {
        socket.emit('upsert_contestant', { id, name: c?.name, score: c?.score, image: data.filename });
      });
    }

    function uploadForJudge(id) {
      const j = allJudges.find(x => x.id === id);
      const base = `judge_${id}_${Date.now()}`;
      triggerUploadDirect(base, 'judge', (data) => {
        socket.emit('upsert_judge', { id, name: j?.name, image: data.filename });
      });
    }

    document.getElementById('fileInputHidden').addEventListener('change', async function() {
      if (!this.files[0] || !pendingUpload) return;
      const { filename, type, afterUpload } = pendingUpload;
      const form = new FormData();
      form.append('filename', filename);
      form.append('type', type);
      form.append('photo', this.files[0]);

      try {
        const res = await fetch('/api/upload-image', { method: 'POST', body: form });
        const data = await res.json();
        if (data.ok) afterUpload(data);
      } catch(e) { alert('Upload failed'); }
      pendingUpload = null;
    });

    switchTab('scores');
  </script>
</body>
</html>
